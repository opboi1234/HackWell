<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100vh;
        }
        #iframeContainer {
            width: 100%;
            height: 100%;
        }
        #iframeContainer iframe {
            width: 100%;
            height: 100%;
            border: 1px solid #FFFFFF;
        }
        .fullscreen-button {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .fullscreen-button:hover {
            background-color: #0056b3;
        }
        .fullscreen-button:active {
            background-color: #004085;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="iframeContainer">
            <iframe id="gameFrame" src="https://google-pacman.github.io/play/basket-random.html" title="iFrame" scrolling="yes" frameborder="no" allow="fullscreen"></iframe>
        </div>
        <button class="fullscreen-button" onclick="toggleFullscreen()">⛶ Fullscreen</button>
    </div>

    <script>
        function toggleFullscreen() {
            const iframeContainer = document.getElementById('iframeContainer');
            
            if (!document.fullscreenElement) {
                // Enter fullscreen
                if (iframeContainer.requestFullscreen) {
                    iframeContainer.requestFullscreen();
                } else if (iframeContainer.webkitRequestFullscreen) {
                    iframeContainer.webkitRequestFullscreen();
                } else if (iframeContainer.mozRequestFullScreen) {
                    iframeContainer.mozRequestFullScreen();
                } else if (iframeContainer.msRequestFullscreen) {
                    iframeContainer.msRequestFullscreen();
                }
            } else {
                // Exit fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        // Update button text when fullscreen state changes
        document.addEventListener('fullscreenchange', updateButtonText);
        document.addEventListener('webkitfullscreenchange', updateButtonText);
        document.addEventListener('mozfullscreenchange', updateButtonText);
        document.addEventListener('msfullscreenchange', updateButtonText);

        function updateButtonText() {
            const button = document.querySelector('.fullscreen-button');
            if (document.fullscreenElement) {
                button.textContent = '⛶ Exit Fullscreen';
            } else {
                button.textContent = '⛶ Fullscreen';
            }
        }

        // Warn user before closing the tab
        window.addEventListener('beforeunload', function(event) {
            event.preventDefault();
            event.returnValue = '';
            return '';
        });
    </script>
</body>
</html>
